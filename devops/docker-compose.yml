version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tradingbot-backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend/src:/app/src
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/tradingbot
    depends_on:
      - db
      - redis

  redis:
    image: redis:alpine
    container_name: tradingbot-redis
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    container_name: tradingbot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradingbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
